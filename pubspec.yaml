name: j_flutter_ui
description: "This UI library is designed to provide reusable shared widgets."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  auto_size_text: ^3.0.0
  flutter_html: ^3.0.0
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/flags/svg/
    - assets/illustrations/svg/
    - assets/images/png/
    - assets/images/jpg/
    - assets/images/svg/
    - assets/localization/
